# Configuración Apache para Laravel API con Multitenancy
# Archivo: /etc/apache2/sites-available/laravel-api.conf

<VirtualHost *:80>
    ServerName ec2-18-219-51-191.us-east-2.compute.amazonaws.com
    ServerAlias *.ec2-18-219-51-191.us-east-2.compute.amazonaws.com
    DocumentRoot /var/www/html/laravel-api/public
    
    <Directory /var/www/html/laravel-api/public>
        AllowOverride All
        Require all granted
        Options -Indexes
        
        # Seguridad adicional
        <Files ".env*">
            Require all denied
        </Files>
        
        <Files "*.log">
            Require all denied
        </Files>
    </Directory>
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/laravel_error.log
    CustomLog ${APACHE_LOG_DIR}/laravel_access.log combined
    
    # Headers de seguridad
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Ocultar versión de Apache
    ServerTokens Prod
    ServerSignature Off
</VirtualHost>

